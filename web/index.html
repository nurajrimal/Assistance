<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मित्र — Nepali Voice Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0c0f0a;
  --surface: #141810;
  --card: #1a1f15;
  --border: #2c3326;
  --green: #7cb842;
  --green-dim: #4a7a1e;
  --green-glow: rgba(124,184,66,0.25);
  --amber: #d4a843;
  --red: #e05c4a;
  --text: #e8eed8;
  --text-muted: #7a8a6a;
  --text-dim: #3a4530;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Noise texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 720px;
  padding: 0 20px 80px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Header ── */
header {
  padding: 32px 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.brand-name {
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--green);
  text-shadow: 0 0 20px var(--green-glow);
  letter-spacing: -0.5px;
}

.brand-tag {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1.5px;
}

.led {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: led-blink 3s ease-in-out infinite;
}
.led.listening { background: var(--amber); box-shadow: 0 0 12px var(--amber); animation: led-pulse 0.8s ease-in-out infinite; }
.led.speaking  { background: var(--red);   box-shadow: 0 0 12px var(--red);   animation: led-pulse 0.4s ease-in-out infinite; }
.led.thinking  { background: var(--green-dim); animation: led-spin 1s linear infinite; }

@keyframes led-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes led-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
@keyframes led-spin  { 0%{opacity:1} 50%{opacity:0.2} 100%{opacity:1} }

/* ── Chat window ── */
.chat-window {
  flex: 1;
  margin: 24px 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 300px;
  max-height: 50vh;
  overflow-y: auto;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.chat-window::-webkit-scrollbar { width: 4px; }
.chat-window::-webkit-scrollbar-track { background: transparent; }
.chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text-dim);
  padding: 40px 0;
}

.empty-glyph {
  font-size: 48px;
  opacity: 0.3;
  font-family: 'Noto Sans Devanagari', sans-serif;
}

.empty-text {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Message bubbles */
.msg {
  display: flex;
  gap: 12px;
  animation: msg-in 0.3s ease;
}
@keyframes msg-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  border: 1px solid var(--border);
  background: var(--card);
}

.msg.mitra .msg-avatar { border-color: var(--green-dim); color: var(--green); }
.msg.user  .msg-avatar { border-color: var(--border); }

.msg-bubble {
  max-width: 78%;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.7;
  border: 1px solid var(--border);
  background: var(--card);
}

.msg.mitra .msg-bubble {
  border-color: var(--green-dim);
  background: rgba(124,184,66,0.05);
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: 15px;
  color: var(--text);
}

.msg.user .msg-bubble {
  background: var(--surface);
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: 15px;
  color: var(--text-muted);
  text-align: right;
}

/* Thinking dots */
.thinking-dots span {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  margin: 0 2px;
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

/* ── Mic button area ── */
.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 24px 0;
  border-top: 1px solid var(--border);
}

.mic-btn {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid var(--green-dim);
  background: var(--card);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  transition: all 0.2s;
  position: relative;
  color: var(--green);
  box-shadow: 0 0 0 0 var(--green-glow);
}

.mic-btn:hover {
  border-color: var(--green);
  background: rgba(124,184,66,0.08);
  box-shadow: 0 0 20px var(--green-glow);
  transform: scale(1.05);
}

.mic-btn.active {
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(212,168,67,0.1);
  animation: mic-pulse 1s ease-in-out infinite;
}

.mic-btn.speaking-state {
  border-color: var(--red);
  color: var(--red);
  animation: none;
}

@keyframes mic-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(212,168,67,0.4); }
  50%      { box-shadow: 0 0 0 16px rgba(212,168,67,0); }
}

.mic-hint {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-align: center;
  font-family: 'Noto Sans Devanagari', sans-serif;
}

/* Text input row */
.input-row {
  display: flex;
  gap: 10px;
  width: 100%;
}

.txt-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.txt-input::placeholder { color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; }
.txt-input:focus { border-color: var(--green-dim); }

.send-btn {
  background: var(--green-dim);
  border: 1px solid var(--green-dim);
  border-radius: 10px;
  padding: 12px 18px;
  color: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 1px;
}
.send-btn:hover { background: var(--green); border-color: var(--green); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.reset-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.reset-btn:hover { border-color: var(--red); color: var(--red); }

/* No mic warning */
.no-mic-warn {
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 1px;
  text-align: center;
  display: none;
}

/* Audio playing indicator */
.audio-bar {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 20px;
  opacity: 0;
  transition: opacity 0.3s;
}
.audio-bar.active { opacity: 1; }
.audio-bar span {
  display: block;
  width: 3px;
  background: var(--red);
  border-radius: 2px;
  animation: bar-wave 0.7s ease-in-out infinite;
  min-height: 3px;
}
.audio-bar span:nth-child(2) { animation-delay: 0.1s; }
.audio-bar span:nth-child(3) { animation-delay: 0.2s; }
.audio-bar span:nth-child(4) { animation-delay: 0.3s; }
.audio-bar span:nth-child(5) { animation-delay: 0.2s; }
@keyframes bar-wave { 0%,100%{height:4px} 50%{height:18px} }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-name">मित्र</div>
      <div class="brand-tag">Nepali Voice Assistant</div>
    </div>
    <div class="status-bar">
      <div class="led" id="led"></div>
      <span id="status-label">READY</span>
    </div>
  </header>

  <div class="chat-window" id="chat">
    <div class="empty-state" id="empty">
      <div class="empty-glyph">म</div>
      <div class="empty-text">बोल्नुहोस् वा टाइप गर्नुहोस्</div>
    </div>
  </div>

  <div class="controls">

    <!-- Mic button -->
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Click to speak">
      🎙️
    </button>
    <div class="audio-bar" id="audio-bar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="mic-hint" id="mic-hint">बोल्न थिच्नुहोस् &nbsp;·&nbsp; Click to speak</div>
    <div class="no-mic-warn" id="no-mic-warn">⚠️ Browser ले microphone support गर्दैन। Chrome प्रयोग गर्नुहोस्।</div>

    <!-- Text input -->
    <div class="input-row">
      <input class="txt-input" id="txt-input" type="text"
        placeholder="टाइप गर्नुहोस्... / Type here..."
        onkeydown="if(event.key==='Enter') sendText()" />
      <button class="send-btn" id="send-btn" onclick="sendText()">SEND →</button>
    </div>

    <button class="reset-btn" onclick="resetChat()">↺ RESET CHAT</button>
  </div>

</div>

<script>
let isListening = false;
let isBusy = false;
let recognition = null;

// ── Status helpers ─────────────────────────────────────────
function setStatus(state, label) {
  const led = document.getElementById('led');
  const lbl = document.getElementById('status-label');
  led.className = 'led ' + (state || '');
  lbl.textContent = label;
}

// ── Chat rendering ─────────────────────────────────────────
function addMessage(role, text) {
  document.getElementById('empty')?.remove();
  const chat = document.getElementById('chat');

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'mitra' ? 'म' : '🧑';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addThinking() {
  document.getElementById('empty')?.remove();
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg mitra';
  msg.id = 'thinking-msg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = 'म';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function removeThinking() {
  document.getElementById('thinking-msg')?.remove();
}

// ── Send text to backend ───────────────────────────────────
async function sendMessage(text) {
  if (!text.trim() || isBusy) return;
  isBusy = true;

  document.getElementById('send-btn').disabled = true;
  addMessage('user', text);
  addThinking();
  setStatus('thinking', 'THINKING');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    removeThinking();

    addMessage('mitra', data.reply);

    // Play audio if available
    if (data.audio) {
      playAudio(data.audio);
    } else {
      setStatus('', 'READY');
      isBusy = false;
    }
  } catch (err) {
    removeThinking();
    addMessage('mitra', 'Server जडान भएन। `python app.py` चलिरहेको छ?');
    setStatus('', 'READY');
    isBusy = false;
  }
}

function sendText() {
  const input = document.getElementById('txt-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendMessage(text);
}

// ── Audio playback ─────────────────────────────────────────
function playAudio(b64) {
  setStatus('speaking', 'SPEAKING');
  document.getElementById('mic-btn').classList.add('speaking-state');
  document.getElementById('audio-bar').classList.add('active');
  document.getElementById('mic-hint').textContent = 'मित्र बोल्दैछ...';

  const audio = new Audio('data:audio/mp3;base64,' + b64);
  audio.onended = () => {
    document.getElementById('mic-btn').classList.remove('speaking-state');
    document.getElementById('audio-bar').classList.remove('active');
    document.getElementById('mic-hint').textContent = 'बोल्न थिच्नुहोस् · Click to speak';
    setStatus('', 'READY');
    isBusy = false;
    document.getElementById('send-btn').disabled = false;
  };
  audio.play().catch(() => {
    setStatus('', 'READY');
    isBusy = false;
    document.getElementById('send-btn').disabled = false;
  });
}

// ── Microphone / Speech Recognition ───────────────────────
function toggleMic() {
  if (isBusy) return;
  if (isListening) { stopListening(); return; }
  startListening();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('no-mic-warn').style.display = 'block';
    return;
  }

  recognition = new SR();
  recognition.lang = 'ne-NP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    setStatus('listening', 'LISTENING');
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-btn').textContent = '⏹️';
    document.getElementById('mic-hint').textContent = 'सुन्दैछु... बोल्नुहोस्';
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    stopListening();
    document.getElementById('txt-input').value = text;
    sendMessage(text);
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error === 'not-allowed') alert('Microphone permission चाहिन्छ।');
  };

  recognition.onend = () => stopListening();
  recognition.start();
}

function stopListening() {
  if (recognition) { try { recognition.stop(); } catch{} }
  isListening = false;
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('mic-btn').textContent = '🎙️';
  document.getElementById('mic-hint').textContent = 'बोल्न थिच्नुहोस् · Click to speak';
  if (document.getElementById('status-label').textContent === 'LISTENING') {
    setStatus('', 'READY');
  }
}

// ── Reset ──────────────────────────────────────────────────
async function resetChat() {
  await fetch('/reset', { method: 'POST' });
  const chat = document.getElementById('chat');
  chat.innerHTML = `<div class="empty-state" id="empty">
    <div class="empty-glyph">म</div>
    <div class="empty-text">बोल्नुहोस् वा टाइप गर्नुहोस्</div>
  </div>`;
  isBusy = false;
  document.getElementById('send-btn').disabled = false;
  setStatus('', 'READY');
}

// Check mic support on load
if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
  document.getElementById('no-mic-warn').style.display = 'block';
}
</script>
</body>
</html>
